[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[project]
name = "airbyte-slim"
description = "PyAirbyte slim distribution"
readme = "README.md"
authors = [
    { name = "Airbyte", email = "contact@airbyte.io" },
]
requires-python = ">=3.14,<3.15"
dynamic = ["version"]
dependencies = [
    "airbyte-api>=0.53.0,<1.0",
    "airbyte-protocol-models-pdv2>=0.13.0,<1.0",
    "cryptography>=44.0.0,<45.0.0",
    "google-auth>=2.27.0,<3.0",
    "google-cloud-secret-manager>=2.17.0,<3.0",
    "jsonschema>=3.2.0,<5.0",
    "orjson>=3.10,<4.0",
    "overrides>=7.4.0,<8.0",
    "pydantic>=2.0,<3.0",
    "pydantic-core",
    "python-dotenv>=1.0.1,<2.0",
    "python-ulid>=3.0.0,<4.0",
    "pyyaml>=6.0.2,<7.0",
    "requests!=3.32.0",
    "rich>=13.7.0,<14.0",
    "structlog>=24.4.0,<25.0",
    "typing-extensions",
    "uuid7>=0.1.0,<1.0",
    "uv>=0.5.0,<0.9.0",
]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
fallback-version = "0.0.0"
format = "{base}a{distance}"
format-jinja = "{% if distance == 0 %}{{ base }}{% else %}{{ base }}a{{ distance }}{% endif %}"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["airbyte"]
exclude = [
    "airbyte/caches",
    "airbyte/cli",
    "airbyte/destinations",
    "airbyte/mcp",
    "airbyte/shared/sql_processor.py",
    "airbyte/sources",
    "airbyte/_processors/sql",
]

[tool.hatch.build.targets.sdist]
exclude = [
    "airbyte/caches",
    "airbyte/cli",
    "airbyte/destinations",
    "airbyte/mcp",
    "airbyte/shared/sql_processor.py",
    "airbyte/sources",
    "airbyte/_processors/sql",
]
